name: Deploy auto-battles to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/auto-battles/package-lock.json

      - name: Install
        working-directory: apps/auto-battles
        run: npm ci

      - name: Build
        working-directory: apps/auto-battles
        env:
          GITHUB_PAGES_BASE: /${{ github.event.repository.name }}/auto-battles/
        run: npm run build

      - name: Stage site
        run: |
          mkdir -p _site/auto-battles
          cp -r apps/auto-battles/client/dist/. _site/auto-battles/
          cp apps/auto-battles/client/dist/index.html _site/auto-battles/404.html
          cat > _site/index.html <<'HTML'
          <!DOCTYPE html>
          <meta charset="utf-8">
          <title>vibe-co</title>
          <meta http-equiv="refresh" content="0; url=./auto-battles/">
          <link rel="canonical" href="./auto-battles/">
          <p><a href="./auto-battles/">auto-battles</a></p>
          HTML
          echo '--- artifact tree ---'
          find _site -maxdepth 3 -print

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
